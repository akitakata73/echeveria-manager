<style>
:root{--bg:#f5f5f2;--card:#fff;--ink:#1f2933;--muted:#6b7280;--line:#e5e7eb;--accent:#4b7f52;--accent2:#e8f3ea;--warn:#b45309;--danger:#b91c1c;--shadow:0 8px 24px rgba(0,0,0,.08);--radius:18px;--safe-bottom:env(safe-area-inset-bottom)}
*{box-sizing:border-box}body{margin:0;background:var(--bg);color:var(--ink);font-family:-apple-system,BlinkMacSystemFont,"Hiragino Sans","Yu Gothic",sans-serif;-webkit-text-size-adjust:100%}
.app{max-width:520px;margin:0 auto;min-height:100svh;display:flex;flex-direction:column}header{position:sticky;top:0;z-index:5;background:rgba(245,245,242,.94);backdrop-filter:blur(10px);padding:14px 16px 10px;border-bottom:1px solid rgba(229,231,235,.7);display:flex;align-items:center;justify-content:space-between;gap:10px}
h1{font-size:22px;margin:0;font-weight:850}.small{font-size:12px;color:var(--muted);line-height:1.4}main{flex:1;padding:0 14px 92px}
.card{background:var(--card);border-radius:var(--radius);box-shadow:var(--shadow);padding:14px;margin:12px 0}.section-title{font-size:15px;font-weight:850;margin:18px 2px 8px;display:flex;justify-content:space-between;align-items:center}
.btn{border:0;border-radius:14px;padding:12px;background:var(--accent);color:#fff;font-weight:850;font-size:14px;width:100%;cursor:pointer}.btn.secondary{background:#eef2f0;color:#24452a}.btn.ghost{background:#fff;border:1px solid var(--line);color:#374151}.btn.danger{background:#b91c1c}
.btnrow{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-top:10px}.btnrow.three{grid-template-columns:1fr 1fr 1fr}.plant-card{display:flex;gap:12px;align-items:center;cursor:pointer}
.avatar{width:62px;height:62px;border-radius:16px;background:#eef2f0;display:flex;align-items:center;justify-content:center;border:1px solid var(--line);flex:none;overflow:hidden;text-align:center}.avatar img{width:100%;height:100%;object-fit:cover}.hero{width:100%;aspect-ratio:1/1;border-radius:22px;background:#eef2f0;display:flex;align-items:center;justify-content:center;overflow:hidden;border:1px solid var(--line);margin-bottom:12px}.hero img{width:100%;height:100%;object-fit:cover}
.grow{flex:1}.title{font-size:16px;font-weight:850;margin-bottom:2px}.subtitle{font-size:12px;color:var(--muted);line-height:1.42}
.pill{display:inline-flex;align-items:center;padding:5px 9px;border-radius:999px;background:var(--accent2);color:#2f6238;font-size:11px;font-weight:800;margin:3px 3px 0 0}.pill.gray{background:#f3f4f6;color:#4b5563}.pill.warn{background:#fff7ed;color:var(--warn)}.pill.danger{background:#fef2f2;color:var(--danger)}
.form label{display:block;font-size:12px;font-weight:850;color:#4b5563;margin:13px 0 6px}.form input,.form select,.form textarea{width:100%;border:1px solid var(--line);border-radius:14px;padding:12px;font-size:16px;background:#fff;outline:none}.form textarea{min-height:88px;resize:vertical}
.search{width:100%;border:1px solid var(--line);background:#fff;border-radius:14px;padding:12px;font-size:16px;outline:none;margin:8px 0}.chips{display:flex;gap:8px;overflow:auto;padding:4px 0 8px}.chip{flex:none;border:1px solid var(--line);background:#fff;border-radius:999px;padding:8px 11px;font-size:12px;font-weight:800;color:#4b5563;cursor:pointer}.chip.active{background:var(--accent);color:#fff;border-color:var(--accent)}
.kv{display:grid;grid-template-columns:104px 1fr;gap:8px;font-size:13px;padding:8px 0;border-bottom:1px solid #f0f0f0}.kv .k{color:var(--muted);font-weight:800}
.history{border-left:3px solid #d6e8d8;margin:10px 0 0 4px;padding-left:12px}.hist-item{margin:0 0 14px;padding-bottom:12px;border-bottom:1px solid var(--line)}.hist-title{font-size:13px;font-weight:850}.hist-meta{font-size:11px;color:var(--muted);margin-top:2px}.hist-text{font-size:13px;line-height:1.45;margin-top:5px}
.tabbar{position:fixed;bottom:0;left:0;right:0;margin:0 auto;max-width:520px;height:78px;padding-bottom:var(--safe-bottom);background:rgba(255,255,255,.96);border-top:1px solid var(--line);display:grid;grid-template-columns:repeat(5,1fr)}.tab{display:flex;flex-direction:column;align-items:center;justify-content:center;gap:3px;color:#6b7280;font-size:10px;font-weight:800;cursor:pointer}.tab .ico{font-size:20px}.tab.active{color:var(--accent)}
.master-row,.export-row{display:flex;justify-content:space-between;align-items:center;border-bottom:1px solid var(--line);padding:12px 0;gap:10px}.master-row:last-child,.export-row:last-child{border-bottom:0}.master-name{font-size:14px;font-weight:850}.master-meta{font-size:11px;color:var(--muted);margin-top:2px}.iconbtn{border:1px solid var(--line);background:#fff;border-radius:10px;padding:8px 9px;font-size:12px;font-weight:850;color:#374151;cursor:pointer}.iconbtn.danger{color:#b91c1c}
.notice{background:#fffbeb;color:#92400e;border:1px solid #fde68a;padding:10px;border-radius:14px;font-size:12px;line-height:1.45;margin-top:8px}.empty-note{text-align:center;color:var(--muted);padding:24px 10px;font-size:13px;line-height:1.5}.preview{background:#0f172a;color:#e5e7eb;border-radius:14px;padding:12px;font-size:11px;line-height:1.45;white-space:pre;overflow:auto;max-height:340px;font-family:ui-monospace,SFMono-Regular,Menlo,Monaco,Consolas,monospace}
.album{display:grid;grid-template-columns:repeat(3,1fr);gap:8px}.photo-tile{aspect-ratio:1/1;border-radius:14px;overflow:hidden;background:#eef2f0;border:1px solid var(--line);position:relative}.photo-tile img{width:100%;height:100%;object-fit:cover}.photo-label{position:absolute;left:4px;right:4px;bottom:4px;background:rgba(0,0,0,.55);color:#fff;border-radius:8px;padding:3px;font-size:9px;text-align:center}
.toast{position:fixed;left:18px;right:18px;bottom:92px;max-width:480px;margin:auto;background:#111827;color:#fff;border-radius:16px;padding:12px 14px;font-size:13px;font-weight:800;opacity:0;transform:translateY(12px);transition:.25s;pointer-events:none;z-index:20}.toast.show{opacity:1;transform:translateY(0)}
.calendar-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:6px}.cal-head{text-align:center;font-size:11px;color:var(--muted);font-weight:850}.cal-day{min-height:48px;border:1px solid var(--line);border-radius:12px;background:#fff;padding:5px;font-size:12px;cursor:pointer}.cal-day.active{background:var(--accent);color:#fff;border-color:var(--accent)}.cal-day.muted{opacity:.35}.cal-count{display:block;margin-top:3px;font-size:10px;font-weight:850}.date-row{display:flex;justify-content:space-between;align-items:center;border-bottom:1px solid var(--line);padding:10px 0;gap:10px}.date-row:last-child{border-bottom:0}.date-main{font-size:13px;font-weight:850}.date-sub{font-size:11px;color:var(--muted);margin-top:2px}.summary-calc{font-size:12px;line-height:1.45}.details-box{margin-top:8px}.group-title{font-size:13px;font-weight:850;margin:14px 0 6px;color:#374151}.filter-row{display:flex;gap:8px;overflow:auto;padding:4px 0 8px}</style>
</head>
<body>
<div class="app"><header><div><h1 id="screenTitle">ホーム</h1><div class="small" id="screenSub">エケベリア管理 PWA v19</div></div><button class="btn secondary" style="width:auto;padding:9px 12px" onclick="refreshCurrent()">↻</button></header><main id="main"></main><nav class="tabbar"><div class="tab active" onclick="go('home')" id="tab-home"><div class="ico">🏠</div><div>ホーム</div></div><div class="tab" onclick="go('plants')" id="tab-plants"><div class="ico">🌱</div><div>株一覧</div></div><div class="tab" onclick="go('records')" id="tab-records"><div class="ico">📝</div><div>記録</div></div><div class="tab" onclick="go('calendar')" id="tab-calendar"><div class="ico">📅</div><div>カレンダー</div></div><div class="tab" onclick="go('settings')" id="tab-settings"><div class="ico">⚙️</div><div>設定</div></div></nav></div><div class="toast" id="toast"></div>
<script>
const STORAGE_KEY="echeveria_pwa_v19_data";let state=null,current="home",filter="すべて",selectedPlantId=null,activeMaster="cultivars",editingMasterId=null,pendingPhoto=null,calendarMonth=dateOnly().slice(0,7),selectedCalendarDate=dateOnly(),calendarFilter="すべて";
function id(p){return p+"_"+Date.now().toString(36)+"_"+Math.random().toString(36).slice(2,8)}function nowText(){const d=new Date();return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')} ${String(d.getHours()).padStart(2,'0')}:${String(d.getMinutes()).padStart(2,'0')}`}function dateOnly(){const d=new Date();return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`}function addDays(ds,n){const d=ds?new Date(ds+"T00:00:00"):new Date();d.setDate(d.getDate()+Number(n||0));return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`}

function datePartFromText(t){return (t||"").slice(0,10)}
function daysSinceDate(ds){
  if(!ds)return null;
  const a=new Date(ds+"T00:00:00"),b=new Date(dateOnly()+"T00:00:00");
  return Math.max(0,Math.floor((b-a)/86400000));
}
function markBackupNeeded(reason){
  state.backup=state.backup||{lastAt:"",dirty:false,reason:""};
  state.backup.dirty=true;
  state.backup.reason=reason||"データ更新";
}
function markBackupDone(){
  state.backup=state.backup||{};
  state.backup.lastAt=nowText();
  state.backup.dirty=false;
  state.backup.reason="";
  state.exportLogs=state.exportLogs||[];
  state.exportLogs.unshift({id:id("backup"),type:"backup",happenedAt:state.backup.lastAt,note:"JSONバックアップをコピー"});
  save();
}
function backupStatus(){
  state.backup=state.backup||{lastAt:"",dirty:true,reason:"バックアップ状態未設定"};
  const last=state.backup.lastAt||"";
  const days=daysSinceDate(datePartFromText(last));
  const photos=(state.photos||[]).length;
  let level="ok",title="バックアップ状況",body="";
  if(!last){level="warn";body="まだバックアップ記録がありません。JSONバックアップを保存してください。";}
  else if(state.backup.dirty){level="warn";body=`前回バックアップからデータ更新があります。前回：${last}（${days}日前）`;}
  else if(days!==null&&days>=7){level="warn";body=`前回バックアップから${days}日経過しています。週1回の保存目安を超えています。`;}
  else{body=`前回バックアップ：${last}（${days}日前）。写真：${photos}枚。`;}
  return{level,title,body,days,last,photos,dirty:!!state.backup.dirty,reason:state.backup.reason||""};
}
function backupCardHtml(){
  const b=backupStatus();
  const cls=b.level==="warn"?"notice":"";
  return `<div class="card ${cls}"><div class="title">バックアップ状況</div><div class="subtitle">${esc(b.body)}${b.reason?`<br>理由：${esc(b.reason)}`:""}</div><div class="btnrow"><button class="btn secondary" onclick="openExportPreview('backup')">JSONバックアップ</button><button class="btn ghost" onclick="openImport()">復元</button></div></div>`;
}

function inferDirection(txt){if((txt||"").includes("東"))return"東向き";if((txt||"").includes("西"))return"西向き";if((txt||"").includes("北"))return"北向き";if((txt||"").includes("照明"))return"室内照明";return"南向き"}function inferPlacement(txt){return (txt||"").includes("屋外")||(txt||"").includes("外")?"屋外":"室内"}function normalizeDry(v){if(!v)return"普通";if(v.includes("早め"))return"やや乾きやすい";if(v.includes("遅め"))return"やや乾きにくい";return v.replace(/^\\d：/,"")}function normalizeWind(v){if(v==="風強め")return"強風あり";if(v==="弱め")return"中くらい";return v}
function defaultData(){const cv1=id("cv"),cv2=id("cv"),cv3=id("cv"),pot1=id("pot"),pot2=id("pot"),pot3=id("pot"),med1=id("med"),med2=id("med"),tray1=id("tray"),tray2=id("tray");return{version:"pwa-v19",updatedAt:nowText(),masters:{cultivars:[{id:cv1,name:"桃太郎",note:"赤い爪。通常管理"},{id:cv2,name:"ブラックマディバ",note:"辛め管理"},{id:cv3,name:"大和錦",note:"葉挿し・胴切り候補"}],pots:[{id:pot1,name:"A-25S浅鉢",note:"標準",dry:"やや乾きやすい"},{id:pot2,name:"小型仮鉢",note:"発根待ち",dry:"普通"},{id:pot3,name:"葉挿しトレー",note:"葉挿し用",dry:"やや乾きにくい"}],media:[{id:med1,name:"チャコボール",note:"標準用土",dry:"やや乾きやすい"},{id:med2,name:"チャコボール＋少量肥料",note:"成株用",dry:"普通"}]},trays:[{id:tray1,name:"A-25Sトレー1",direction:"南向き",placement:"室内",dry:"普通",light:"強い",wind:"弱風あり",note:"中央は乾きやすい"},{id:tray2,name:"発根待ちエリア",direction:"室内照明",placement:"室内",dry:"やや乾きにくい",light:"中くらい",wind:"中くらい",note:"水を入れすぎない"}],plants:[],histories:[],photos:[],backup:{lastAt:"",dirty:true,reason:"初回バックアップ未実施"},exportLogs:[]}}
function normalizePlantForV7(p){
  let growthType=p.growthType||"成株",status=p.status||"良好",needsAttention=!!p.needsAttention;
  if(status==="葉挿し"){growthType="葉挿し";status="良好"}
  if(status==="要観察"){status="良好";needsAttention=true}
  if(growthType==="通常株")growthType="成株";
  return{...p,growthType,status,needsAttention,acquiredDate:p.acquiredDate||"",autoCheckEnabled:p.autoCheckEnabled!==false,autoCheckBaseDays:p.autoCheckBaseDays||5,lastWateredAt:p.lastWateredAt||"未実施",lastWaterAmountLevel:p.lastWaterAmountLevel||"未記録",lastWaterMethod:p.lastWaterMethod||"未記録"};
}
function migrate(d){d.version="pwa-v19";d.masters=d.masters||{};d.masters.pots=(d.masters.pots||[]).map(x=>({...x,dry:normalizeDry(x.dry||"普通")}));d.masters.media=(d.masters.media||[]).map(x=>({...x,dry:normalizeDry(x.dry||"普通")}));d.trays=(d.trays||[]).map(t=>({...t,direction:t.direction||inferDirection((t.location||"")+" "+(t.type||"")),placement:t.placement||inferPlacement(t.location||""),dry:normalizeDry(t.dry),light:normalizeDry(t.light||"中くらい"),wind:normalizeWind(t.wind||"中くらい")}));d.plants=(d.plants||[]).map(p=>normalizePlantForV7(p));d.histories=d.histories||[];d.photos=d.photos||[];d.backup=d.backup||{lastAt:"",dirty:true,reason:"バックアップ状態未設定"};d.exportLogs=d.exportLogs||[];return d}
function load(){const raw=localStorage.getItem(STORAGE_KEY)||localStorage.getItem("echeveria_pwa_v18_data")||localStorage.getItem("echeveria_pwa_v17_data")||localStorage.getItem("echeveria_pwa_v16_data")||localStorage.getItem("echeveria_pwa_v15_data")||localStorage.getItem("echeveria_pwa_v14_data")||localStorage.getItem("echeveria_pwa_v13_data")||localStorage.getItem("echeveria_pwa_v12_data")||localStorage.getItem("echeveria_pwa_v11_data")||localStorage.getItem("echeveria_pwa_v10_data")||localStorage.getItem("echeveria_pwa_v9_data")||localStorage.getItem("echeveria_pwa_v8_data")||localStorage.getItem("echeveria_pwa_v7_data")||localStorage.getItem("echeveria_pwa_v6_data")||localStorage.getItem("echeveria_pwa_v5_data")||localStorage.getItem("echeveria_pwa_v4_data")||localStorage.getItem("echeveria_pwa_v3_data")||localStorage.getItem("echeveria_pwa_v2_data")||localStorage.getItem("echeveria_pwa_v1_data");if(raw){try{state=migrate(JSON.parse(raw));save()}catch{state=defaultData();save()}}else{state=defaultData();save()}}function save(){state.updatedAt=nowText();localStorage.setItem(STORAGE_KEY,JSON.stringify(state))}
function el(i){return document.getElementById(i)}function toast(m){const t=el("toast");t.textContent=m;t.classList.add("show");setTimeout(()=>t.classList.remove("show"),1600)}function setHeader(t,s){el("screenTitle").textContent=t;el("screenSub").textContent=s||"エケベリア管理 PWA v19"}function setTabs(){document.querySelectorAll(".tab").forEach(x=>x.classList.remove("active"));el("tab-"+current)?.classList.add("active")}let formDirty=false, formSaved=false, currentExportKind="";
function markDirty(){formDirty=true}
function clearDirty(){formDirty=false;formSaved=false}
function hasUnsavedText(){
  if(formSaved)return false;
  const ids=["pName","pPosition","pMemo","wMemo","oMemo"];
  return ids.some(i=>el(i)&&el(i).value.trim().length>0);
}
function confirmLeaveIfNeeded(){
  if(!formDirty&&!hasUnsavedText())return true;
  return confirm("ページを移動すると、入力内容がリセットされます。ページを移動しますか？\n\n移動する場合はOK、入力を続ける場合はキャンセルを押してください。");
}
function go(s){if(!confirmLeaveIfNeeded())return;clearDirty();current=s;setTabs();({home:renderHome,plants:renderPlants,records:renderRecords,calendar:renderCalendar,settings:renderSettings}[s])()}
function refreshCurrent(){
  if(!confirmLeaveIfNeeded())return;
  save();
  clearDirty();
  if(current==="home")renderHome();
  else if(current==="plants")renderPlants();
  else if(current==="records")renderRecords();
  else if(current==="calendar")renderCalendar();
  else if(current==="settings")renderSettings();
  toast("更新しました");
}
function mList(t){return t==="places"?state.trays:state.masters[t]}function mName(t,i){return (mList(t).find(x=>x.id===i)||{}).name||"未設定"}function masterName(t){return{cultivars:"品種",pots:"鉢",media:"用土",places:"置き場所"}[t]}function plantById(i){return state.plants.find(p=>p.id===i)}function activePlants(){return state.plants.filter(p=>!p.isArchived)}function sortByNextCheck(list){
  return list.slice().sort((a,b)=>{
    const ad=a.nextCheckDate||"9999-99-99", bd=b.nextCheckDate||"9999-99-99";
    const dateDiff=ad.localeCompare(bd);
    if(dateDiff!==0)return dateDiff;
    return (a.displayName||"").localeCompare(b.displayName||"","ja");
  });
}
function usedCount(t,i){return activePlants().filter(p=>t==="cultivars"?p.cultivarId===i:t==="pots"?p.potId===i:t==="media"?p.mediumId===i:p.trayId===i).length}
function sortedMasterList(t){
  return mList(t).slice().sort((a,b)=>{
    const diff=usedCount(t,b.id)-usedCount(t,a.id);
    if(diff!==0)return diff;
    return (a.name||"").localeCompare(b.name||"","ja");
  });
}
function baseDaysFor(status,growth){if(growth==="葉挿し")return{days:3,label:"葉挿し基準 3日"};if(growth==="頭株"&&status==="発根待ち")return{days:5,label:"発根待ちの頭株基準 5日"};if(growth==="元株")return{days:6,label:"胴切り後の元株基準 6日"};if(growth==="成株")return{days:7,label:"成株基準 7日"};return{days:7,label:"その他基準 7日"}}
function seasonAdjustment(month){if(month===3)return{value:0,label:"3月補正 ±0日"};if(month>=4&&month<=6)return{value:-0.5,label:"4〜6月補正 -0.5日"};if(month>=7&&month<=9)return{value:-1,label:"7〜9月補正 -1.0日"};if(month===10)return{value:-0.5,label:"10月補正 -0.5日"};if(month===11)return{value:0,label:"11月補正 ±0日"};return{value:1,label:"12〜2月補正 +1.0日"}}
function sunlightAdjustment(trayId){const tr=state?.trays?.find(x=>x.id===trayId),dir=tr?.direction||"";if(dir==="南向き")return{value:-0.5,label:"南向き補正 -0.5日"};if(dir==="北向き")return{value:0.5,label:"北向き補正 +0.5日"};if(dir==="室内照明")return{value:0,label:"室内照明補正 ±0日"};return{value:0,label:`${dir||"日当たり未設定"}補正 ±0日`}}
function wateringTimeAdjustment(txt){const m=(txt||"").match(/(\d{1,2}):(\d{2})/);if(!m)return{value:0,label:"水やり時刻補正 ±0日"};return Number(m[1])>=17?{value:0.5,label:"17時以降水やり補正 +0.5日"}:{value:0,label:"17時前水やり補正 ±0日"}}
function statusAdjustment(status){if(status==="蒸れ注意")return{value:-0.5,label:"蒸れ注意補正 -0.5日",warning:"蒸れ注意のため確認を早めています。水やり判断は慎重に。"};if(status==="発根管理中")return{value:-0.5,label:"発根管理中補正 -0.5日"};if(status==="休眠気味")return{value:1,label:"休眠気味補正 +1.0日"};return{value:0,label:"状態補正 ±0日"}}
function clamp(v,min,max){return Math.max(min,Math.min(max,v))}
function dryAdjustmentByLevel(level,labelPrefix){
  if(level==="かなり乾きやすい")return{value:-1,label:`${labelPrefix}かなり乾きやすい補正 -1.0日`};
  if(level==="やや乾きやすい")return{value:-0.5,label:`${labelPrefix}やや乾きやすい補正 -0.5日`};

function monthAdd(ym,delta){const d=new Date(ym+"-01T00:00:00");d.setMonth(d.getMonth()+delta);return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}`}
function calendarFilteredPlants(list){
  if(calendarFilter==="すべて")return list;
  if(calendarFilter==="要観察")return list.filter(p=>p.needsAttention||p.status!=="良好");
  if(["成株","葉挿し","頭株","元株","子株","実生","その他"].includes(calendarFilter))return list.filter(p=>(p.growthType||"成株")===calendarFilter);
  return list.filter(p=>p.status===calendarFilter);
}
function renderDateGroup(title,list){

function openExportCenter(){setHeader("出力・バックアップ","JSONバックアップ");el("main").innerHTML=`<div class="card notice">JSONバックアップをコピーすると、前回バックアップ日時として記録します。コピー後はGoogle Driveやメモ等に保存してください。</div><div class="card"><div class="export-row"><div class="grow"><div class="master-name">JSONバックアップ</div><div class="master-meta">復元用。定期的にコピーして保存してください。</div></div><button class="iconbtn" onclick="openExportPreview('backup')">表示</button></div></div><div class="card"><button class="btn ghost" onclick="go('settings')">戻る</button></div>`}
function openExportPreview(k){currentExportKind=k;const label={plants:"株一覧CSV",histories:"履歴CSV",backup:"JSONバックアップ"}[k],data=makeCSV(k);setHeader(label,"コピーして保存");el("main").innerHTML=`<div class="card"><div class="title">${label}</div><div class="subtitle">下の内容をコピーして保存してください。</div><div class="btnrow"><button class="btn" onclick="copyText()">コピー</button><button class="btn ghost" onclick="openExportCenter()">戻る</button></div></div><textarea id="exportText" class="preview" style="width:100%;min-height:360px">${esc(data)}</textarea>`}
async function copyText(){const txt=el("exportText").value;try{await navigator.clipboard.writeText(txt);if(currentExportKind==="backup"){markBackupDone();toast("バックアップをコピーし、保存済みとして記録しました")}else toast("コピーしました")}catch{el("exportText").select();document.execCommand("copy");if(currentExportKind==="backup"){markBackupDone();toast("バックアップをコピーし、保存済みとして記録しました")}else toast("コピーしました")}}
function openImport(){setHeader("JSON復元","バックアップから復元");el("main").innerHTML=`<div class="card form"><div class="notice">JSONを貼り付けて検証します。復元すると現在データを上書きします。</div><label>JSON</label><textarea id="importText"></textarea><div id="importResult"></div><div class="btnrow"><button class="btn" onclick="validateImport()">検証</button><button class="btn ghost" onclick="go('settings')">戻る</button></div></div>`}
function validateImport(){try{const obj=JSON.parse(el("importText").value);if(!obj.masters||!obj.trays||!obj.plants||!obj.histories){el("importResult").innerHTML=`<div class="notice">必要なキーが不足しています。</div>`;return}el("importResult").innerHTML=`<div class="notice">形式OK。株 ${obj.plants.length}件、履歴 ${obj.histories.length}件、写真 ${(obj.photos||[]).length}枚。<br><br><button class="btn danger" onclick="restoreImport()">このデータで復元</button></div>`}catch{el("importResult").innerHTML=`<div class="notice">JSONとして読み込めません。</div>`}}
function restoreImport(){if(!confirm("現在データを上書きします。よろしいですか？"))return;state=migrate(JSON.parse(el("importText").value));save();toast("復元しました");go("home")}
function resetConfirm(){if(confirm("初期化します。JSONバックアップを取ってから実行してください。")){state=defaultData();save();toast("初期化しました");go("home")}}
if("serviceWorker"in navigator){navigator.serviceWorker.register("./service-worker.js").catch(()=>{})}load();go("home");
</script>
</body>
</html>
