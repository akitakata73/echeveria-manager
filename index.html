<div class="app"><header><div><h1 id="screenTitle">ホーム</h1><div class="small" id="screenSub">エケベリア管理 PWA v49 Observe Safe Fix</div></div><button class="btn secondary" style="width:auto;padding:9px 12px" onclick="refreshCurrent()">↻</button></header><main id="main"></main><nav class="tabbar"><div class="tab active" onclick="go('home')" id="tab-home"><div class="ico">🏠</div><div>ホーム</div></div><div class="tab" onclick="go('plants')" id="tab-plants"><div class="ico">🌱</div><div>株一覧</div></div><div class="tab" onclick="go('records')" id="tab-records"><div class="ico">📝</div><div>記録</div></div><div class="tab" onclick="go('calendar')" id="tab-calendar"><div class="ico">📅</div><div>カレンダー</div></div><div class="tab" onclick="go('settings')" id="tab-settings"><div class="ico">⚙️</div><div>設定</div></div></nav></div><div class="toast" id="toast"></div>
<script>
const APP_VERSION="v49-observe-safe-fix";const STORAGE_KEY="echeveria_pwa_data";let state=null,current="home",filter="すべて",plantFilterMode="status",plantStatusFilter="すべて",plantCultivarFilter="すべて",selectedPlantId=null,activeMaster="cultivars",editingMasterId=null,pendingPhoto=null,calendarMonth=dateOnly().slice(0,7),selectedCalendarDate=dateOnly(),calendarFilter="すべて";
function id(p){return p+"_"+Date.now().toString(36)+"_"+Math.random().toString(36).slice(2,8)}function nowText(){const d=new Date();return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')} ${String(d.getHours()).padStart(2,'0')}:${String(d.getMinutes()).padStart(2,'0')}`}function dateOnly(){const d=new Date();return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`}function addDays(ds,n){const d=ds?new Date(ds+"T00:00:00"):new Date();d.setDate(d.getDate()+Number(n||0));return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`}

function datePartFromText(t){return (t||"").slice(0,10)}
function daysSinceDate(ds){
  if(!ds)return null;
  const a=new Date(ds+"T00:00:00"),b=new Date(dateOnly()+"T00:00:00");
  return Math.max(0,Math.floor((b-a)/86400000));
}
function markBackupNeeded(reason){
  state.backup=state.backup||{lastAt:"",dirty:false,reason:""};
  state.backup.dirty=true;
  state.backup.reason=reason||"データ更新";
}
function markBackupDone(){
  state.backup=state.backup||{};
  state.backup.lastAt=nowText();
  state.backup.dirty=false;
  state.backup.reason="";
  state.exportLogs=state.exportLogs||[];
  state.exportLogs.unshift({id:id("backup"),type:"backup",happenedAt:state.backup.lastAt,note:"JSONバックアップをコピー"});
  save();
}
function backupStatus(){
  state.backup=state.backup||{lastAt:"",dirty:true,reason:"バックアップ状態未設定"};
  const last=state.backup.lastAt||"";
  const days=daysSinceDate(datePartFromText(last));
  const photos=(state.photos||[]).length;
  let level="ok",title="バックアップ状況",body="";
  if(!last){level="warn";body="まだバックアップ記録がありません。JSONバックアップを保存してください。";}
  else if(state.backup.dirty){level="warn";body=`前回バックアップからデータ更新があります。前回：${last}（${days}日前）`;}
  else if(days!==null&&days>=7){level="warn";body=`前回バックアップから${days}日経過しています。週1回の保存目安を超えています。`;}
  else{body=`前回バックアップ：${last}（${days}日前）。写真：${photos}枚。`;}
  return{level,title,body,days,last,photos,dirty:!!state.backup.dirty,reason:state.backup.reason||""};
}
function backupCardHtml(){
  const b=backupStatus();
  const cls=b.level==="warn"?"notice":"";
  return `<div class="card ${cls}"><div class="title">バックアップ状況</div><div class="subtitle">${esc(b.body)}${b.reason?`<br>理由：${esc(b.reason)}`:""}</div><div class="btnrow"><button class="btn secondary" onclick="openExportPreview('backup')">JSONバックアップ</button><button class="btn ghost" onclick="openImport()">復元</button></div></div>`;
}

function inferDirection(txt){if((txt||"").includes("東"))return"東向き";if((txt||"").includes("西"))return"西向き";if((txt||"").includes("北"))return"北向き";if((txt||"").includes("照明"))return"室内照明";return"南向き"}function inferPlacement(txt){return (txt||"").includes("屋外")||(txt||"").includes("外")?"屋外":"室内"}function normalizeDry(v){if(!v)return"普通";if(v.includes("早め"))return"やや乾きやすい";if(v.includes("遅め"))return"やや乾きにくい";return v.replace(/^\\d：/,"")}function normalizeWind(v){if(v==="風強め")return"強風あり";if(v==="弱め")return"中くらい";return v}
function defaultData(){const cv1=id("cv"),cv2=id("cv"),cv3=id("cv"),pot1=id("pot"),pot2=id("pot"),pot3=id("pot"),med1=id("med"),med2=id("med"),tray1=id("tray"),tray2=id("tray");return{version:"pwa-v49-observe-safe-fix",updatedAt:nowText(),masters:{cultivars:[{id:cv1,name:"桃太郎",note:"赤い爪。通常管理"},{id:cv2,name:"ブラックマディバ",note:"辛め管理"},{id:cv3,name:"大和錦",note:"葉挿し・胴切り候補"}],pots:[{id:pot1,name:"A-25S浅鉢",note:"標準",dry:"やや乾きやすい"},{id:pot2,name:"小型仮鉢",note:"発根待ち",dry:"普通"},{id:pot3,name:"葉挿しトレー",note:"葉挿し用",dry:"やや乾きにくい"}],media:[{id:med1,name:"チャコボール",note:"標準用土",dry:"やや乾きやすい"},{id:med2,name:"チャコボール＋少量肥料",note:"成株用",dry:"普通"}]},trays:[{id:tray1,name:"A-25Sトレー1",direction:"南向き",placement:"室内",dry:"普通",light:"強い",wind:"弱風あり",note:"中央は乾きやすい"},{id:tray2,name:"発根待ちエリア",direction:"室内照明",placement:"室内",dry:"やや乾きにくい",light:"中くらい",wind:"中くらい",note:"水を入れすぎない"}],plants:[],histories:[],photos:[],backup:{lastAt:"",dirty:true,reason:"初回バックアップ未実施"},exportLogs:[]}}
function normalizePlantForV7(p){
  p=(p&&typeof p==="object")?p:{};
  let growthType=p.growthType||"成株",status=p.status||"良好",needsAttention=!!p.needsAttention;
  if(status==="葉挿し"){growthType="葉挿し";status="良好"}
  if(status==="要観察"){status="良好";needsAttention=true}
  if(growthType==="通常株")growthType="成株";
  return{...p,id:p.id||id("pl"),displayName:p.displayName||p.name||"名称未設定",cultivarId:p.cultivarId||"",potId:p.potId||"",mediumId:p.mediumId||"",trayId:p.trayId||"",position:p.position||"",growthType,status,needsAttention,acquiredDate:p.acquiredDate||"",autoCheckEnabled:p.autoCheckEnabled!==false,autoCheckBaseDays:p.autoCheckBaseDays||5,lastWateredAt:p.lastWateredAt||"未実施",lastWaterAmountLevel:p.lastWaterAmountLevel||"未記録",lastWaterMethod:p.lastWaterMethod||"未記録",nextCheckDate:p.nextCheckDate||"",memo:p.memo||"",createdAt:p.createdAt||nowText(),updatedAt:p.updatedAt||p.createdAt||nowText(),isArchived:!!p.isArchived};
}
function ensureArray(v){return Array.isArray(v)?v:[]}
function ensureMasterItem(arr, fallback){
  const list=ensureArray(arr).filter(x=>x&&typeof x==="object");
  return list.length?list:[fallback];
}
function migrate(d){
  const base=defaultData();
  d=(d&&typeof d==="object")?d:{};
  d.version="pwa-v49-observe-safe-fix";
  d.masters=d.masters&&typeof d.masters==="object"?d.masters:{};
  d.masters.cultivars=ensureMasterItem(d.masters.cultivars, base.masters.cultivars[0]);
  d.masters.pots=ensureMasterItem(d.masters.pots, base.masters.pots[0]).map(x=>({...x,dry:normalizeDry(x.dry||"普通")}));
  d.masters.media=ensureMasterItem(d.masters.media, base.masters.media[0]).map(x=>({...x,dry:normalizeDry(x.dry||"普通")}));
  d.trays=ensureMasterItem(d.trays, base.trays[0]).map(t=>({...t,direction:t.direction||inferDirection((t.location||"")+" "+(t.type||"")),placement:t.placement||inferPlacement(t.location||""),dry:normalizeDry(t.dry),light:normalizeDry(t.light||"中くらい"),wind:normalizeWind(t.wind||"中くらい")}));
  d.plants=ensureArray(d.plants).filter(p=>p&&typeof p==="object").map(p=>normalizePlantForV7(p));
  d.histories=ensureArray(d.histories).filter(h=>h&&typeof h==="object").map(h=>({...h,id:h.id||id("his"),plantId:h.plantId||"",type:h.type||"system",title:h.title||"記録",happenedAt:h.happenedAt||h.createdAt||nowText(),note:h.note||""}));
  d.photos=ensureArray(d.photos).filter(ph=>ph&&typeof ph==="object");
  d.backup=d.backup&&typeof d.backup==="object"?d.backup:{lastAt:"",dirty:true,reason:"バックアップ状態未設定"};
  d.exportLogs=ensureArray(d.exportLogs);
  d.saveStatus=d.saveStatus||{ok:true,at:d.lastSavedAt||nowText(),message:"読込済み"};
  return d;
}





function parseDateValue(v){
  if(!v)return 0;
  const t=Date.parse(String(v).replace(" ","T"));
  return Number.isFinite(t)?t:0;
}
function latestTimestampFromData(d){
  if(!d)return 0;
  const vals=[d.lastSavedAt,d.updatedAt,d.backup?.lastAt,d.createdAt,d.savedAt].map(parseDateValue);
  const data=d.data||d;
  for(const p of (data.plants||[])){vals.push(parseDateValue(p.updatedAt));vals.push(parseDateValue(p.createdAt));vals.push(parseDateValue(p.lastWateredAt));}
  for(const h of (data.histories||[])){vals.push(parseDateValue(h.happenedAt));}
  for(const ph of (data.photos||[])){vals.push(parseDateValue(ph.takenAt));}
  return Math.max(0,...vals);
}


function parseDateValue(v){
  if(!v)return 0;
  const t=Date.parse(String(v).replace(" ","T"));
  return Number.isFinite(t)?t:0;
}
function dataCountSummary(d){
  const data=d?.data||d||{};
  return {
    plants:(data.plants||[]).length,
    histories:(data.histories||[]).length,
    photos:(data.photos||[]).length
  };
}
function dataLooksUsable(d){
  const c=dataCountSummary(d);
  return c.plants>0 || c.histories>0 || c.photos>0;
}
function readJsonKey(k){
  const raw=localStorage.getItem(k);
  if(!raw)return null;
  try{return JSON.parse(raw)}catch(e){return null}
}
function estimateBytes(text){
  try{return new Blob([text||""]).size}catch(e){return (text||"").length}
}
function formatBytes(bytes){
  if(!Number.isFinite(bytes))return "不明";
  if(bytes<1024)return `${bytes}B`;
  if(bytes<1024*1024)return `${(bytes/1024).toFixed(1)}KB`;
  return `${(bytes/1024/1024).toFixed(2)}MB`;
}
function getFixedData(){
  return readJsonKey(STORAGE_KEY);
}
function getPreviousData(){
  return readJsonKey("echeveria_pwa_previous_data");
}

let isAppUpdating=false;
let photoUrlCache={};
function hasInlinePhotoData(ph){return !!(ph&&(ph.dataUrl||ph.data||ph.src));}
function photoMetaOnly(ph){
  if(!ph)return ph;
  const {dataUrl,data,src,...rest}=ph;
  return {...rest,storage:"indexeddb"};
}
function cleanStateForStorage(obj){
  const copy=JSON.parse(JSON.stringify(obj||{}));
  copy.photos=(copy.photos||[]).map(photoMetaOnly);
  return copy;
}
function openPhotoDB(){
  return new Promise((resolve,reject)=>{
    if(!("indexedDB" in window)){resolve(null);return}
    const req=indexedDB.open("echeveria_photo_db",1);
    req.onupgradeneeded=()=>{const db=req.result;if(!db.objectStoreNames.contains("photos"))db.createObjectStore("photos",{keyPath:"id"})};
    req.onsuccess=()=>resolve(req.result);
    req.onerror=()=>reject(req.error);
  });
}
async function putPhotoBlob(id, blob){
  const db=await openPhotoDB();
  if(!db)return false;
  return new Promise((resolve,reject)=>{
    const tx=db.transaction("photos","readwrite");
    tx.objectStore("photos").put({id,blob,updatedAt:nowText()});
    tx.oncomplete=()=>resolve(true);
    tx.onerror=()=>reject(tx.error);
  });
}
async function getPhotoBlob(id){
  const db=await openPhotoDB();
  if(!db)return null;
  return new Promise((resolve,reject)=>{
    const tx=db.transaction("photos","readonly");
    const req=tx.objectStore("photos").get(id);
    req.onsuccess=()=>resolve(req.result?.blob||null);
    req.onerror=()=>reject(req.error);
  });
}
function dataUrlToBlob(dataUrl){
  const parts=String(dataUrl||"").split(",");
  if(parts.length<2)return null;
  const mime=(parts[0].match(/:(.*?);/)||[])[1]||"image/jpeg";
  const bin=atob(parts[1]);
  const arr=new Uint8Array(bin.length);
  for(let i=0;i<bin.length;i++)arr[i]=bin.charCodeAt(i);
  return new Blob([arr],{type:mime});
}
async function migrateInlinePhotosToDB(){

  let changed=false,failed=0;
  for(const ph of state.photos){
    const data=ph.dataUrl||ph.data||ph.src;
    if(data){
      try{
        const blob=dataUrlToBlob(data);
        if(blob){
          await putPhotoBlob(ph.id,blob);
          delete ph.dataUrl;delete ph.data;delete ph.src;
          ph.storage="indexeddb";
          changed=true;
        }
      }catch(e){failed++}
    }
  }
  if(changed){
    state.photoMigrationAt=nowText();
    const res=save();
    if(!res.ok)toast("写真移行後の保存に失敗しました");
  }
  if(failed)toast("一部写真の移行に失敗しました");
}
async function photoUrl(ph){

    const blob=await getPhotoBlob(ph.id);
    if(blob){
      const url=URL.createObjectURL(blob);
      photoUrlCache[ph.id]=url;
      return url;
    }
  }catch(e){}

}

      try{toast("保存に失敗しました")}catch(_){}

    }

    const main=safeSetLocalStorage(STORAGE_KEY,payload);
    if(!main.ok){
      state.saveStatus={ok:false,at:nowText(),message:"本番保存に失敗しました。既存データは維持されています。",error:main.error};
      try{toast("保存に失敗しました")}catch(_){}
      return state.saveStatus;
    }
    if(!verifyStoredPayload(STORAGE_KEY,payload)){

      try{toast("保存に失敗しました")}catch(_){}
      return state.saveStatus;
    }

    try{localStorage.removeItem(tmpKey)}catch(e){}

    let previousOk=true;

  }
}

      const regs=await navigator.serviceWorker.getRegistrations();
